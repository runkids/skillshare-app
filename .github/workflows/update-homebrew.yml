name: Update Homebrew

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Get version from release tag
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for release asset to be available
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_REPO: ${{ github.repository }}
        run: |
          ASSET_NAME="skillshare_${VERSION}_aarch64.dmg"
          MAX_ATTEMPTS=20
          ATTEMPT=0

          echo "Waiting for release asset: $ASSET_NAME"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."

            RELEASE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${GH_REPO}/releases/tags/v${VERSION}" 2>/dev/null || echo "{}")

            ASSET_INFO=$(echo "$RELEASE_INFO" | jq -r ".assets[] | select(.name == \"$ASSET_NAME\")" 2>/dev/null || echo "")

            if [ -n "$ASSET_INFO" ]; then
              ASSET_STATE=$(echo "$ASSET_INFO" | jq -r '.state')
              ASSET_SIZE=$(echo "$ASSET_INFO" | jq -r '.size')

              if [ "$ASSET_STATE" = "uploaded" ] && [ "$ASSET_SIZE" -gt 0 ]; then
                echo "Asset found and fully uploaded (size: $ASSET_SIZE bytes)"
                echo "EXPECTED_SIZE=$ASSET_SIZE" >> "$GITHUB_ENV"
                break
              else
                echo "Asset state: $ASSET_STATE, size: $ASSET_SIZE - waiting..."
              fi
            else
              echo "Asset not found yet..."
            fi

            sleep 15
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "::error::Timeout waiting for release asset after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Download and calculate SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_REPO: ${{ github.repository }}
        run: |
          ASSET_URL="https://github.com/${GH_REPO}/releases/download/v${VERSION}/skillshare_${VERSION}_aarch64.dmg"
          MAX_RETRIES=5
          RETRY_DELAY=10
          ATTEMPT=0

          echo "Downloading: $ASSET_URL"

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Download attempt $ATTEMPT/$MAX_RETRIES..."

            if curl -fSL --retry 3 --retry-delay 5 "$ASSET_URL" -o "skillshare.dmg"; then
              ACTUAL_SIZE=$(stat -c%s "skillshare.dmg" 2>/dev/null || stat -f%z "skillshare.dmg" 2>/dev/null)

              if [ "$ACTUAL_SIZE" -eq "$EXPECTED_SIZE" ]; then
                echo "Download successful, size verified: $ACTUAL_SIZE bytes"
                SHA256=$(shasum -a 256 skillshare.dmg | cut -d ' ' -f 1)
                echo "SHA256: $SHA256"
                echo "SHA256_AARCH64=$SHA256" >> "$GITHUB_OUTPUT"
                rm -f skillshare.dmg
                exit 0
              else
                echo "Size mismatch: expected $EXPECTED_SIZE, got $ACTUAL_SIZE"
              fi
            fi

            echo "Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
            RETRY_DELAY=$((RETRY_DELAY * 2))
          done

          echo "::error::Failed to download asset after $MAX_RETRIES attempts"
          exit 1

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: runkids/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256: ${{ steps.sha.outputs.SHA256_AARCH64 }}
          GH_REPO: ${{ github.repository }}
        run: |
          cat > homebrew-tap/Casks/skillshare-app.rb << CASKEOF
          cask "skillshare-app" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${GH_REPO}/releases/download/v#{version}/skillshare_#{version}_aarch64.dmg"
            name "Skillshare App"
            desc "Desktop GUI for Skillshare CLI"
            homepage "https://github.com/${GH_REPO}"

            depends_on macos: ">= :catalina"

            app "skillshare.app"

            zap trash: [
              "~/Library/Application Support/com.skillshare.app",
              "~/Library/Caches/com.skillshare.app",
              "~/Library/Preferences/com.skillshare.app.plist",
            ]
          end
          CASKEOF

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/skillshare-app.rb
          git commit -m "Update skillshare-app to ${VERSION}"
          git push
